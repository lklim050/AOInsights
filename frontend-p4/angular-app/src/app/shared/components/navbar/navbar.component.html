<nav class="navbar">
  <div class="nav-container">
    <!-- Logo -->
    <a routerLink="/" class="nav-logo-link">
      <app-logo width="180" height="48"></app-logo>
    </a>

    <!-- Right Side -->
    <div class="nav-right">
      <!-- Points Badge — always visible when logged in -->
      <div class="nav-points" *ngIf="currentUser">
        ⭐ {{ currentUser.points_bal ?? 0 }} pts
      </div>

      <!-- Avatar + Dropdown -->
      <div class="nav-avatar-wrapper" *ngIf="currentUser">
        <!-- Avatar Button -->
        <button
          class="nav-avatar"
          (click)="toggleDropdown()"
          [style.background]="getAvatarColor(currentUser.name)"
        >
          {{ getInitial() }}
        </button>
        <!-- ↑ Clicking avatar toggles dropdown -->

        <!-- Dropdown Menu -->
        <div class="nav-dropdown" *ngIf="isDropdownOpen">
          <!-- User Info Header -->
          <div class="dropdown-header">
            <div
              class="dropdown-avatar"
              [style.background]="getAvatarColor(currentUser.name)"
            >
              {{ getInitial() }}
            </div>
            <div class="dropdown-user-info">
              <span class="dropdown-name">
                {{ currentUser.name || currentUser.email }}
              </span>
              <span class="dropdown-email" *ngIf="currentUser.name">
                {{ currentUser.email }}
              </span>
              <span
                class="dropdown-role"
                [class.host]="currentUser.role === 'HOST'"
                [class.admin]="currentUser.role === 'ADMIN'"
              >
                {{ currentUser.role }}
              </span>
            </div>
          </div>

          <div class="dropdown-divider"></div>

          <!-- Menu Items -->
          <a
            *ngIf="currentUser.role === 'ADMIN'"
            routerLink="/admin"
            class="dropdown-item"
            click="closeDropdown()"
          >
            🛡️ Admin Dashboard</a
          >
          <a
            routerLink="/user/profile"
            class="dropdown-item"
            (click)="closeDropdown()"
          >
            👤 My Profile
          </a>

          <a
            *ngIf="currentUser.role === 'HOST' || currentUser.role === 'ADMIN'"
            routerLink="/host"
            class="dropdown-item"
            (click)="closeDropdown()"
          >
            📋 Host Dashboard
          </a>

          <a routerLink="/home" class="dropdown-item" (click)="closeDropdown()">
            🏠 Browse Surveys
          </a>

          <div class="dropdown-divider"></div>

          <button class="dropdown-item danger" (click)="logout()">
            🚪 Sign Out
          </button>
        </div>
      </div>

      <!-- Guest Nav -->
      <div class="nav-right" *ngIf="!currentUser">
        <a routerLink="/login" class="nav-link">Sign In</a>
        <a routerLink="/register" class="btn-register">Register</a>
      </div>
    </div>
  </div>
</nav>
