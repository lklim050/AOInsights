<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1>🕊️AOInsights</h1>
      <p>Create your account</p>
    </div>

    <!-- Success Message -->
    <div class="api-success" *ngIf="successMessage">
      {{ successMessage }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <!-- Name Field -->
      <div class="form-group">
        <label for="name">Full Name</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          placeholder="Your name"
          [class.invalid]="name?.invalid && name?.touched"
        />
        <span class="error-text" *ngIf="name?.invalid && name?.touched">
          Name must be at least 2 characters
        </span>
      </div>

      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.invalid]="email?.invalid && email?.touched"
        />
        <span class="error-text" *ngIf="email?.invalid && email?.touched">
          Please enter a valid email
        </span>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'password' : 'text'"
            formControlName="password"
            placeholder="Min. 10 characters"
            [class.invalid]="password?.invalid && password?.touched"
          />
          <button
            type="button"
            (click)="togglePassword()"
            class="toggle-btn"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            <!-- Eye icon (show password) -->
            <svg
              *ngIf="!showPassword"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <!-- Eye-off icon (hide password) -->
            <svg
              *ngIf="showPassword"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
              />
              <path
                d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
              />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>
        <span class="error-text" *ngIf="password?.invalid && password?.touched">
          Password must be at least 10 characters
        </span>
      </div>
      <!-- Confirm Password Field -->
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-wrapper">
          <input
            id="confirmPassword"
            [type]="showPassword ? 'password' : 'text'"
            formControlName="confirmPassword"
            placeholder="Re-enter your password"
            [class.invalid]="
              confirmPassword?.invalid && confirmPassword?.touched
            "
          />
          <button
            type="button"
            (click)="togglePassword()"
            class="toggle-btn"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            <!-- Eye icon (show password) -->
            <svg
              *ngIf="!showPassword"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <!-- Eye-off icon (hide password) -->
            <svg
              *ngIf="showPassword"
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
              />
              <path
                d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
              />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>
        <span
          class="error-text"
          *ngIf="
            confirmPassword?.errors?.['passwordMismatch'] &&
            confirmPassword?.touched
          "
        >
          Passwords do not match
          <!-- ↑ ['passwordMismatch'] bracket notation needed
            because Angular template can't use dot notation
            for dynamic error keys -->
        </span>
        <span
          class="error-text"
          *ngIf="
            confirmPassword?.errors?.['required'] && confirmPassword?.touched
          "
        >
          Please confirm your password
        </span>
      </div>
      <!-- Role Selection -->
      <div class="form-group">
        <label>I want to join as</label>
        <div class="role-toggle">
          <button
            type="button"
            [class.active]="role?.value === 'USER'"
            (click)="role?.setValue('USER')"
          >
            👤 Survey Taker
          </button>
          <button
            type="button"
            [class.active]="role?.value === 'HOST'"
            (click)="role?.setValue('HOST')"
          >
            📋 Survey Host
          </button>
        </div>
        <!-- ↑ type="button" is critical here — without it,
                clicking triggers form submit accidentally -->
      </div>

      <!-- API Error -->
      <div class="api-error" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="btn-primary"
        [disabled]="registerForm.invalid || isLoading"
      >
        {{ isLoading ? "Creating account..." : "Create Account" }}
      </button>
    </form>

    <p class="auth-footer">
      Already have an account?
      <a routerLink="/login">Sign in here</a>
    </p>
  </div>
</div>
